name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500
      - uses: actions/setup-go@4a3601121dd0
        with:
          go-version: '1.26'
          cache: true
      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.64.8
      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@latest
      - name: Lint (golangci-lint)
        run: golangci-lint run ./...
      - name: Vet
        run: go vet ./...
      - name: Format check (gofumpt)
        run: gofumpt -l . | grep -q . && exit 1 || true
      - name: Test
        run: go test -v -race -count=1 ./...
      - name: Vulnerability check (govulncheck)
        run: govulncheck ./...

  push-ghcr:
    runs-on: ubuntu-latest
    needs: [quality-gate]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500
      - name: Set up container build
        uses: docker/setup-buildx-action@d7f5e7f509e4
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7d
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push to GHCR
        uses: docker/build-push-action@f9f3042f7e27
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: attest

  push-dockerhub:
    runs-on: ubuntu-latest
    needs: [quality-gate]
    steps:
      - uses: actions/checkout@de0fac2e4500
      - name: Set up container build
        uses: docker/setup-buildx-action@d7f5e7f509e4
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7d
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push to Docker Hub
        uses: docker/build-push-action@f9f3042f7e27
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/${{ secrets.DOCKER_USERNAME }}/xray-exporter:${{ github.ref_name }}
            docker.io/${{ secrets.DOCKER_USERNAME }}/xray-exporter:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: attest

  release:
    needs: [push-ghcr, push-dockerhub]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500
      - uses: actions/setup-go@4a3601121dd0
        with:
          go-version: '1.26'
          cache: true
      - name: Build binaries
        run: make
      - name: Upload checksum
        run: sha256sum dist/* > dist/checksum.txt
      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a
        with:
          files: dist/*
          generate_release_notes: true
