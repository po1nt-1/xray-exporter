name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '1.26'
          cache: true
      - name: Lint
        run: make lint
      - name: Format
        run: make fmt
      - name: Test
        run: make test

  build:
    needs: check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '1.26'
          cache: true
      - name: Build binary
        run: |
          make build \
            VERSION=${{ github.ref_name }} \
            COMMIT=${{ github.sha }} \
            GOOS=${{ matrix.goos }} \
            GOARCH=${{ matrix.goarch }}
      - name: Checksum
        run: sha256sum dist/* > dist/checksum.txt
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: xray-exporter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 7
