name: Build and Deploy

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: xray-exporter

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@d35c09dadaae286abae533382f8da165634f678a
        with:
          go-version: '1.26'
          cache: true
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${{ github.ref_name }}
          if ! [[ "${{ github.ref }}" =~ ^refs/tags/ ]]; then
            VERSION=${{ github.sha }}
          fi
          mkdir -p dist
          BINARY="xray-exporter-${{ matrix.goos }}-${{ matrix.goarch }}"
          [ "${{ matrix.goos }}" = "windows" ] && BINARY="${BINARY}.exe"
          go build -ldflags="-s -w -X main.buildCommit=${{ github.sha }} -X main.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ) -X main.buildVersion=${VERSION}" -o "dist/${BINARY}" .
          chmod +x "dist/${BINARY}"
          sha256sum "dist/${BINARY}" > "dist/${BINARY}.sha256"
      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f80663b9321b171a7104a8c51bf5edb5ca6
        with:
          name: xray-exporter-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 7

  build-push-ghcr:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up container build
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push to GHCR
        uses: docker/build-push-action@0565240e2d4ab88bba5387d2195559b1751dd14f
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ${{ startsWith(github.ref, 'refs/tags/') && format('ghcr.io/{0}:{1}', github.repository, 'latest') || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: attest

  build-push-dockerhub:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up container build
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push to Docker Hub
        uses: docker/build-push-action@0565240e2d4ab88bba5387d2195559b1751dd14f
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            docker.io/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ startsWith(github.ref, 'refs/tags/') && format('docker.io/{0}/{1}:{2}', secrets.DOCKER_USERNAME, env.IMAGE_NAME, 'latest') || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: attest

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-push-ghcr, build-push-dockerhub]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          path: dist/
          pattern: xray-exporter-*
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@fe420f256dbbfed6e05ae1b1f88b400c1daa4e6b
        with:
          files: dist/*
          generate_release_notes: true
