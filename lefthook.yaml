---
pre-commit:
  parallel: true
  commands:
    check-yaml:
      glob: "*.{yml,yaml}"
      run: python3 -c "import yaml,sys;[list(yaml.safe_load_all(open(f)))for f in sys.argv[1:]]"
    gitleaks:
      run: gitleaks detect --source . --no-banner --log-level=error --no-git
    lint:
      glob: "*.go"
      run: make lint
    fmt-check:
      glob: "*.go"
      run: make fmt-check

pre-push:
  commands:
    test:
      run: make test
